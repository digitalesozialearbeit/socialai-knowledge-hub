<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SocialAI Knowledge Hub</title>
  <meta name="description" content="Interner Knowledge Hub des SocialAI-Projekts (FFG Laura Bassi 4.0)">
  <meta name="robots" content="noindex, nofollow">

  <!-- Theme: docsify-themeable (wie legal-history-hub) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --base-font-size: 16px;
      --theme-color: #2c5aa0;
      --sidebar-width: 260px;
      --content-max-width: 800px;
    }
  </style>
</head>
<body>
  <div id="app">Laden...</div>

  <script>
    window.$docsify = {
      name: 'SocialAI Knowledge Hub',
      nameLink: '/',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      search: {
        paths: 'auto',
        placeholder: 'Suchen...',
        noData: 'Keine Ergebnisse.',
        depth: 3
      },
      pagination: {
        previousText: '← Zurück',
        nextText: 'Weiter →',
        crossChapter: true,
        crossChapterText: true
      },
      copyCode: {
        buttonText: 'Kopieren',
        successText: 'Kopiert!'
      },
      plugins: [
        // Obsidian-Kompatibilitaet: Frontmatter + Kommentare strippen
        function(hook) {
          hook.beforeEach(function(content) {
            // YAML Frontmatter entfernen
            content = content.replace(/^---[\s\S]*?---\s*\n/, '');
            // Obsidian-Kommentare %%...%% entfernen
            content = content.replace(/%%[\s\S]*?%%/g, '');
            return content;
          });
        }
      ]
    };
  </script>

  <!-- Docsify -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-wikilink@1"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-plugin-flexible-alerts@1"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>

  <!-- Pagination -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <!-- Syntax Highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
